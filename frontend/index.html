<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Docs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidemenu">
        <div class="upload-container">
            <h3>Upload Documents</h3>
            <div id="drop-zone" class="drop-zone">
                <p>Drag & Drop or Click to Upload</p>
                <input type="file" id="file-input" accept=".pdf,.docx" hidden>
            </div>
            <div class="storage-list-header">
                <h3>Available in Storage</h3>
            </div>
            <div id="file-list" class="file-list"></div>
        </div>
    </div>
    <div id="sidebar-resizer" class="resizer horizontal-resizer"></div>
    <div class="main">
        <div class="top-bar">
            <h1>Search Docs</h1>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search across documents...">
                <button id="search-btn">Search</button>
            </div>
        </div>
        
        <div class="content-area">
            <div id="results" class="results-container"></div>
            
            <div id="preview-container" class="preview-container hidden">
                <div class="preview-header">
                    <h2 id="preview-title">Document Preview</h2>
                    <div class="preview-actions">
                        <input type="text" id="per-file-search" placeholder="Find in file...">
                        <button id="find-missing-btn">Find Missing</button>
                        <button id="analyze-btn" style="background-color: #28a745; margin-left: 5px;">Deep Analyze</button>
                    </div>
                </div>
                <div class="preview-split">
                    <div class="preview-left">
                        <div id="preview-body" class="preview-body"></div>
                    </div>
                    <div id="split-resizer" class="resizer horizontal-resizer"></div>
                    <div id="analysis-panel" class="preview-right hidden">
                        <div id="validation-report" class="validation-report hidden"></div>
                        <div id="analysis-report" class="analysis-report-content hidden"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
